server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/unicom_post_alliance_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 15949691869
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.unicom.post.modules.**.domain.entity
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-must-be-long-enough-for-hs256}
  expiration: 86400000   # 24 hours in milliseconds
  header: Authorization
  prefix: Bearer

# 密码强度配置
password:
  min-length: 8
  require-uppercase: true
  require-lowercase: true
  require-digit: true
  require-special: true